services:
  - type: web
    name: healhub
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set this manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Set to your Render URL after first deploy (e.g. https://healhub.onrender.com)
      - key: GEMINI_API_KEY
        sync: false  # Optional – only if you want AI features
